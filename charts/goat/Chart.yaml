apiVersion: v2
name: goat
description: |
  Helm chart for GOAT (Geo Open Accessibility Tool) — a WebGIS platform for
  spatial analysis, accessibility modeling, and collaborative mapping.

  Phase 1 ships only the `core` API service. See docs/ for the roadmap.
type: application
version: 0.1.0
appVersion: "2.5.0"   # adjust to the GOAT release this chart is tested against
icon: https://goat.plan4better.de/favicon.ico
home: https://github.com/plan4better/goat
sources:
  - https://github.com/plan4better/goat
maintainers:
  - name: plan4better
    url: https://plan4better.de
keywords:
  - goat
  - webgis
  - geospatial
  - accessibility
  - routing

# Sub-chart dependencies. Each is gated on `<name>.enabled` per the spec.
# Phase 1 only exercises `redis`; cnpg-operator is declared so plan4better
# profile renders correctly under `helm template`. Other deps (keycloak,
# rabbitmq, minio) land in Phase 2/3.
dependencies:
  - name: cloudnative-pg
    version: "0.22.x"
    repository: https://cloudnative-pg.github.io/charts
    condition: postgresql.operator.enabled
  - name: redis
    version: "20.5.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
