[DEFAULT]
debug = false

[server:main]
use = egg:Paste#http
host = 0.0.0.0
port = 5000

[app:main]
use = egg:ckan
full_stack = true
cache_dir = /tmp/%(ckan.site_id)s/

ckan.site_url = http://localhost:5050
ckan.site_id = default
ckan.site_title = GOAT CKAN
ckan.site_logo = /base/images/ckan-logo.png

beaker.session.secret = ckan-test-secret-key-123456
beaker.session.validate_key = ckan-test-validate-key-789
SECRET_KEY = ckan-test-secret-key-123456

sqlalchemy.url = postgresql://ckan:ckan@ckan-db/ckan
ckan.datastore.write_url = postgresql://ckan:ckan@ckan-db/datastore
ckan.datastore.read_url = postgresql://datastore_ro:datastore@ckan-db/datastore

solr_url = http://solr:8983/solr/ckan
ckan.redis.url = redis://ckan-redis:6379/1

ckan.plugins = envvars stats image_view text_view recline_view datastore spatial_metadata spatial_query harvest ckan_harvester csw_harvester dcat dcat_json_harvester dcat_rdf_harvester
ckan.views.default_views = image_view text_view recline_view

ckan.storage_path = /var/lib/ckan

ckanext.spatial.search_backend = solr-bbox
# iso19139eden includes GMX/INSPIRE extensions; more permissive than the
# default iso19139 which breaks on standard European INSPIRE CSW sources.
# Individual harvest sources can still override this via validator_profiles
# in their config if they need a different profile (e.g. gemini2, fgdc).
ckan.spatial.validator.profiles = iso19139eden
ckan.spatial.srid = 4326
ckanext.spatial.common_locales = de,en

ckan.harvest.mq.type = redis
ckan.harvest.mq.hostname = ckan-redis
ckan.harvest.mq.port = 6379
ckan.harvest.mq.redis_db = 0

ckan.cors.origin_allow_all = true

[loggers]
keys = root, ckan, ckanext, werkzeug

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_ckan]
level = INFO
handlers = console
qualname = ckan
propagate = 0

[logger_ckanext]
level = DEBUG
handlers = console
qualname = ckanext
propagate = 0

[logger_werkzeug]
level = WARNING
handlers = console
qualname = werkzeug
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
