volumes:
  ckan_storage:
  pg_data:
  solr_data:
  redis_data:


services:
  ckan:
    container_name: goat-ckan
    build:
      context: ./ckan
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      ckan-db:
        condition: service_healthy
      solr:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5050:5000"
    volumes:
      - ckan_storage:/var/lib/ckan
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:5000/api/3/action/status_show" ]
      interval: 30s
      timeout: 10s
      retries: 5

  ckan-db:
    container_name: goat-ckan-db
    image: postgis/postgis:15-3.3-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ckan
      POSTGRES_PASSWORD: ckan
      POSTGRES_DB: ckan
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "ckan" ]
      interval: 10s
      timeout: 5s
      retries: 5

  solr:
    container_name: goat-ckan-solr
    image: ckan/ckan-solr:2.10-solr9-spatial
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: goat-ckan-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ckan-worker:
    container_name: goat-ckan-worker
    build:
      context: ./ckan
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      ckan:
        condition: service_healthy
    volumes:
      - ckan_storage:/var/lib/ckan
    command: [ "ckan", "-c", "/etc/ckan/production.ini", "jobs", "worker" ]
    healthcheck:
      disable: true
    restart: unless-stopped

  ckan-harvest-gather:
    container_name: goat-ckan-harvest-gather
    build:
      context: ./ckan
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      ckan:
        condition: service_healthy
    command: [ "ckan", "-c", "/etc/ckan/production.ini", "harvester", "gather-consumer" ]
    healthcheck:
      disable: true
    restart: unless-stopped

  ckan-harvest-fetch:
    container_name: goat-ckan-harvest-fetch
    build:
      context: ./ckan
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      ckan:
        condition: service_healthy
    command: [ "ckan", "-c", "/etc/ckan/production.ini", "harvester", "fetch-consumer" ]
    healthcheck:
      disable: true
    restart: unless-stopped

  ckan-harvest-scheduler:
    container_name: goat-ckan-harvest-scheduler
    build:
      context: ./ckan
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      ckan:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        interval="$${CKAN_HARVEST_SCHEDULE_SECONDS:-3600}"
        while true; do
          ckan -c /etc/ckan/production.ini harvester job-all || true
          ckan -c /etc/ckan/production.ini harvester run || true
          sleep "$$interval"
        done
    healthcheck:
      disable: true
    restart: unless-stopped

networks:
  default:
    name: goat
    external: true
